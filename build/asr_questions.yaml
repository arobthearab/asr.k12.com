# ═══════════════════════════════════════════════════════════════════════
# Stride ASR Questionnaire — Question Bank (Single Source of Truth)
# ═══════════════════════════════════════════════════════════════════════
# Used by build_docx.py (Word), build_excel_asr.py (Excel), and
# the YAML-to-Cypher configuration tool (configureFromYaml.mjs).
#
# Scoring:
#   • Each answer has a risk level: L (Low), G (Guarded), M (Moderate),
#     E (Elevated), H (High).  Scores are derived from the risk level
#     and number of non-NA choices (see score_scales below).
#   • N/A (score = na_score) is automatically appended to every question.
#     Selecting N/A requires a justification in the Notes column.
#   • Answers are ordered from lowest risk (L) to highest risk (H).
#   • measurement = RSK(answer)/100 × RSK(weight)/100 × RSK(classification)
#     truncated to integer for display; fractional part carried in aggregates.
#
# Weight tiers (question importance, rescaled to 0–100):
#   Critical = 100   High = 67   Medium = 33   Info = 13
#
# Classification factor (transcendental question — multiplier for all):
#   Yes-Low = 40   Yes-Medium = 60   Yes-High = 80
#   Yes-Critical = 100   None assigned = 100
#
# Deployment archetypes (routing question — controls question visibility):
#   ON_PREM_INTERNAL = On-premises, internally developed
#   ON_PREM_VENDOR   = On-premises, third-party / canned software
#   CLOUD_SAAS       = Cloud / SaaS
#   HYBRID           = Mixed deployment (all questions visible)

weight_tiers:
  Critical: 100
  High: 67
  Medium: 33
  Info: 13

# ── Transcendental classification question ─────────────────────────
# Asked once at the top of the questionnaire; its factor multiplies
# every other question's measurement.  N/A is NOT available.
classification_question:
  text: "Has a risk classification been assigned to this application?"
  choices:
    - text: "Yes — Low"
      factor: 40
    - text: "Yes — Medium"
      factor: 60
    - text: "Yes — High"
      factor: 80
    - text: "Yes — Critical"
      factor: 100
    - text: "No classification assigned"
      factor: 100

score_scales:
  3:   # 3 non-NA choices
    L: 20
    M: 50
    H: 70
  4:   # 4 non-NA choices
    L: 20
    G: 40
    M: 60
    H: 80
  5:   # 5 non-NA choices
    L: 15
    G: 35
    M: 50
    E: 70
    H: 85

na_score: 1

# ── Deployment archetypes (routing question) ───────────────────────
# Controls which questions are visible.  If a question has no
# applicability list, it is shown for all archetypes.
deployment_archetypes:
  ON_PREM_INTERNAL:
    label: "On-Premises — Internally Developed"
    description: "Application developed and hosted internally"
  ON_PREM_VENDOR:
    label: "On-Premises — Third-Party / Canned"
    description: "Vendor software deployed on organization infrastructure"
  CLOUD_SAAS:
    label: "Cloud / SaaS"
    description: "Cloud-hosted or SaaS application"
  HYBRID:
    label: "Hybrid"
    description: "Mixed deployment model — all questions visible"

# ── Deployment routing question (transcendental) ──────────────────
# Asked once alongside classification; determines which domain
# questions are visible.  N/A is NOT available.
deployment_question:
  text: "What is the application's deployment model?"
  choices:
    - text: "On-premises — internally developed"
      archetype: ON_PREM_INTERNAL
    - text: "On-premises — third-party / canned software"
      archetype: ON_PREM_VENDOR
    - text: "Cloud / SaaS"
      archetype: CLOUD_SAAS
    - text: "Hybrid"
      archetype: HYBRID

domains:
  # ─────────────────────────────────────────────────────────────────
  # Domain 1: Governance and Program Management
  # ─────────────────────────────────────────────────────────────────
  - name: "Governance and Program Management"
    policy_refs:
      - ISP 1.0
      - ISP 2.1
      - ISP 2.4
      - ISP 2.5
    csf_refs:
      - GV.OC
      - GV.PO
      - GV.OV
    questions:
      - text: "Does the application have a designated security owner or steward?"
        weight: High
        choices:
          - text: "Yes — named owner in CMDB"
            risk: L
          - text: "Yes — informal ownership"
            risk: M
          - text: "No — ownership not established"
            risk: H

      - text: "Is the application included in the organization's security policy scope?"
        weight: Medium
        choices:
          - text: "Yes — explicitly referenced"
            risk: L
          - text: "Yes — covered by umbrella policy"
            risk: G
          - text: "No — not in scope"
            risk: M
          - text: "Unknown"
            risk: H

      - text: "When was the last security review or assessment performed?"
        weight: High
        choices:
          - text: "Within 6 months"
            risk: L
          - text: "6–12 months ago"
            risk: G
          - text: "More than 12 months ago"
            risk: M
          - text: "Never assessed"
            risk: H

      - text: "Does the application have documented data flow diagrams?"
        weight: Medium
        choices:
          - text: "Yes — current and reviewed"
            risk: L
          - text: "Yes — but outdated"
            risk: M
          - text: "No — not documented"
            risk: H

      - text: "Has a RACI matrix been established for this application's security controls?"
        weight: High
        choices:
          - text: "Yes — documented and current"
            risk: L
          - text: "Yes — but outdated or incomplete"
            risk: G
          - text: "No — roles informally understood"
            risk: M
          - text: "No — accountability not defined"
            risk: H

      - text: "Are escalation paths and notification responsibilities documented for security incidents involving this application?"
        weight: High
        choices:
          - text: "Yes — RACI-aligned runbook with named contacts"
            risk: L
          - text: "Yes — general escalation via IRP"
            risk: G
          - text: "Partial — ad-hoc escalation only"
            risk: M
          - text: "No — not documented"
            risk: H

      - text: "What is the business necessity classification for this application?"
        weight: Medium
        choices:
          - text: "Nice to have — productivity enhancement (MAY)"
            risk: L
          - text: "Business need — supports key objectives (SHOULD)"
            risk: G
          - text: "KTLO — operationally required (MUST)"
            risk: M
          - text: "Not classified"
            risk: H

      - text: "Which teams and departments are authorized to use this application?"
        weight: Medium
        choices:
          - text: "Single team or department"
            risk: L
          - text: "Multiple departments — formally scoped"
            risk: G
          - text: "Enterprise-wide — all departments"
            risk: M
          - text: "Not formally scoped"
            risk: H

      - text: "Are productivity improvement estimates or benchmarks documented for this application?"
        weight: Medium
        choices:
          - text: "Yes — quantified with baseline metrics and KPIs"
            risk: L
          - text: "Yes — qualitative estimates documented"
            risk: G
          - text: "Informal understanding only"
            risk: M
          - text: "No estimates or benchmarks"
            risk: H

      - text: "Has legal counsel reviewed this application's terms of service, data handling, and intellectual property implications?"
        weight: High
        choices:
          - text: "Yes — reviewed and approved"
            risk: L
          - text: "Yes — reviewed with conditions or caveats"
            risk: G
          - text: "Review requested but not completed"
            risk: M
          - text: "Not reviewed"
            risk: H

      - text: "Has the application been reviewed and approved through the enterprise architecture governance process?"
        weight: High
        choices:
          - text: "Yes — approved with defined boundaries and controls"
            risk: L
          - text: "Yes — approved for limited or pilot use"
            risk: G
          - text: "Under review"
            risk: M
          - text: "No — not submitted for architecture review"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 2: Identity and Access Management
  # ─────────────────────────────────────────────────────────────────
  - name: "Identity and Access Management"
    policy_refs:
      - ISP 4.1
      - ISP 2.3
      - IISP 8.0
    csf_refs:
      - PR.AA
    questions:
      - text: "What authentication mechanism does the application use?"
        weight: Critical
        choices:
          - text: "Passwordless (FIDO2 / passkey / client certificate)"
            risk: L
          - text: "SSO with MFA (Entra ID)"
            risk: G
          - text: "SSO without MFA"
            risk: M
          - text: "Local authentication with MFA"
            risk: E
          - text: "Local authentication without MFA"
            risk: H

      - text: "What authentication method do APIs exposed or consumed by this application use?"
        weight: Critical
        choices:
          - text: "mTLS with certificate pinning"
            risk: L
          - text: "OAuth 2.0 / OIDC with scoped tokens"
            risk: G
          - text: "API key with IP allowlisting and rate limiting"
            risk: M
          - text: "Bearer token without scoping or rotation"
            risk: E
          - text: "No API authentication required"
            risk: H

      - text: "Are user roles and permissions based on the principle of least privilege?"
        weight: High
        choices:
          - text: "Yes — RBAC/ABAC enforced"
            risk: L
          - text: "Partially — some roles over-privileged"
            risk: G
          - text: "No — broad access grants"
            risk: M
          - text: "Unknown"
            risk: H

      - text: "How are service accounts and API keys managed?"
        weight: Critical
        choices:
          - text: "Vault/managed identities with rotation"
            risk: L
          - text: "Stored securely with manual rotation"
            risk: M
          - text: "Hard-coded or shared credentials"
            risk: H

      - text: "Is there automated provisioning/deprovisioning tied to HR events?"
        weight: High
        choices:
          - text: "Yes — fully automated via SCIM/JIT"
            risk: L
          - text: "Partially automated"
            risk: G
          - text: "Manual process only"
            risk: M
          - text: "No process in place"
            risk: H

      - text: "Are access reviews performed periodically?"
        weight: High
        choices:
          - text: "Quarterly or more frequently"
            risk: L
          - text: "Semi-annually"
            risk: G
          - text: "Annually"
            risk: M
          - text: "No periodic reviews"
            risk: H

      - text: "What session management controls does the application implement?"
        weight: High
        choices:
          - text: "Enforced idle and absolute timeouts with secure token handling"
            risk: L
          - text: "Idle timeout only"
            risk: G
          - text: "Long or configurable timeouts without enforcement"
            risk: M
          - text: "No session timeout controls"
            risk: H

      - text: "What is the session timeout duration for the application?"
        weight: Medium
        choices:
          - text: "15 minutes or less"
            risk: L
          - text: "16–30 minutes"
            risk: G
          - text: "31–60 minutes"
            risk: M
          - text: "> 60 minutes or no timeout"
            risk: H

      - text: "How is privileged access managed, monitored, and reviewed?"
        weight: Critical
        applicability: [ON_PREM_INTERNAL, ON_PREM_VENDOR]
        choices:
          - text: "PAM solution with session recording and approval workflows"
            risk: L
          - text: "PAM solution without session recording"
            risk: G
          - text: "Shared admin accounts with manual oversight"
            risk: M
          - text: "No privileged access controls"
            risk: H

      - text: "Are there alerts for anomalous privileged activity?"
        weight: High
        applicability: [ON_PREM_INTERNAL, ON_PREM_VENDOR]
        choices:
          - text: "Yes — real-time alerting with automated response"
            risk: L
          - text: "Yes — alerting requiring manual review"
            risk: G
          - text: "Log-based detection only"
            risk: M
          - text: "No monitoring of privileged activity"
            risk: H

      - text: "If impersonation or delegation is supported, is it traceable and auditable?"
        weight: High
        choices:
          - text: "Yes — full audit trail with distinct identity attribution"
            risk: L
          - text: "Yes — logged but not attributed to the impersonating user"
            risk: M
          - text: "No audit trail for impersonation"
            risk: H

      - text: "Are identity assertions (e.g., SAML claims, OIDC tokens) validated and managed per a documented standard?"
        weight: High
        choices:
          - text: "Yes — assertion validation with claim mapping"
            risk: L
          - text: "Yes — default IdP configuration"
            risk: G
          - text: "No documented standard"
            risk: M
          - text: "Unknown"
            risk: H

      - text: "Is there a formal process for managing and certifying access rights granted to this application?"
        weight: High
        choices:
          - text: "Yes — automated access certification (e.g., SailPoint)"
            risk: L
          - text: "Yes — manual periodic review"
            risk: G
          - text: "No certification process"
            risk: M
          - text: "Unknown"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 3: Data Protection and Privacy
  # ─────────────────────────────────────────────────────────────────
  - name: "Data Protection and Privacy"
    policy_refs:
      - ISP 4.3
      - IISP 2.0
      - IISP 3.0
    csf_refs:
      - PR.DS
    ferpa_note: "Applications processing student education records must comply with FERPA §99.30 (consent), §99.31 (exceptions), and §99.37 (directory information)."
    questions:
      - text: "Does the application process, store, or transmit student education records (FERPA-protected data)?"
        weight: Critical
        choices:
          - text: "No — no education records"
            risk: L
          - text: "Yes — incidental processing"
            risk: G
          - text: "Yes — primary function"
            risk: M
          - text: "Unknown / Not assessed"
            risk: H

      - text: "Is data encrypted at rest?"
        weight: High
        choices:
          - text: "Yes — AES-256 or equivalent"
            risk: L
          - text: "Yes — platform-managed encryption"
            risk: G
          - text: "Partial encryption"
            risk: M
          - text: "No encryption at rest"
            risk: H

      - text: "Is data encrypted in transit?"
        weight: Critical
        guidance: "Validate via CloudFront TLS policy and AWS Config rules (e.g., cloudfront-viewer-policy-https). TLS < 1.2 is a failure condition."
        choices:
          - text: "Yes — TLS 1.3 enforced"
            risk: L
          - text: "Yes — TLS 1.2 enforced"
            risk: G
          - text: "Yes — TLS with older versions allowed"
            risk: M
          - text: "Partial — some endpoints unencrypted"
            risk: E
          - text: "No encryption in transit"
            risk: H

      - text: "What is the data classification level of information processed?"
        weight: High
        choices:
          - text: "Public"
            risk: L
          - text: "Internal / Confidential"
            risk: G
          - text: "Restricted / Highly Sensitive"
            risk: M
          - text: "Not classified"
            risk: H

      - text: "What types of data does the application process?"
        weight: High
        choices:
          - text: "Non-sensitive operational data only"
            risk: L
          - text: "PII — employee or internal user data"
            risk: G
          - text: "PII — student education records or financial data"
            risk: M
          - text: "Not assessed or unknown"
            risk: H

      - text: "Are file transfer mechanisms secured with appropriate controls?"
        weight: High
        guidance: "Evaluate SFTP/SCP, AWS Transfer Family, or equivalent. Assess encryption, key management, and access controls."
        choices:
          - text: "Yes — encrypted transfer with managed keys and access controls"
            risk: L
          - text: "Yes — encrypted transfer with manual key management"
            risk: G
          - text: "Partial — some transfers unencrypted or uncontrolled"
            risk: M
          - text: "No secure file transfer controls"
            risk: H

      - text: "Are data retention and disposal procedures implemented?"
        weight: Medium
        choices:
          - text: "Yes — automated lifecycle management"
            risk: L
          - text: "Yes — manual procedures documented"
            risk: G
          - text: "Partial — some data managed"
            risk: M
          - text: "No retention/disposal procedures"
            risk: H

      - text: "Does the application maintain disclosure records as required by FERPA §99.32?"
        weight: High
        choices:
          - text: "Yes — automated logging"
            risk: L
          - text: "Yes — manual records"
            risk: M
          - text: "No — not implemented"
            risk: H

      - text: "Does the application support notification of student/parent rights as required by FERPA §99.7?"
        weight: High
        choices:
          - text: "Yes — integrated annual notice mechanism"
            risk: L
          - text: "Yes — manual process"
            risk: G
          - text: "Not applicable"
            risk: M
          - text: "Not implemented"
            risk: H

      - text: "Are re-disclosure restrictions enforced when sharing data from this application with third parties (FERPA §99.33)?"
        weight: High
        choices:
          - text: "Yes — technical controls preventing unauthorized re-disclosure"
            risk: L
          - text: "Yes — contractual controls only"
            risk: G
          - text: "No controls"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Does the application support directory information opt-out procedures (FERPA §99.37)?"
        weight: Medium
        choices:
          - text: "Yes — automated opt-out with data suppression"
            risk: L
          - text: "Yes — manual opt-out process"
            risk: G
          - text: "Not applicable"
            risk: M
          - text: "Not implemented"
            risk: H

      - text: "Are limitations on re-disclosure to third parties technically enforced (FERPA §99.12)?"
        weight: Medium
        choices:
          - text: "Yes — DLP or access controls restricting re-disclosure"
            risk: L
          - text: "Yes — policy-based only"
            risk: G
          - text: "No technical enforcement"
            risk: M
          - text: "Not applicable"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 4: Secure Development and Change Management
  # ─────────────────────────────────────────────────────────────────
  - name: "Secure Development and Change Management"
    policy_refs:
      - ISP 4.4
      - IISP 9.0
    csf_refs:
      - PR.PS
    sox_note: "SOX §404 ITGC domains CM-1 through CM-6 and PD-1 through PD-4 require documented change management and security testing controls."
    questions:
      - text: "Is the application developed using a documented SDLC methodology?"
        weight: High
        choices:
          - text: "Yes — with security gates"
            risk: L
          - text: "Yes — without explicit security gates"
            risk: M
          - text: "Informal development process"
            risk: H

      - text: "Are SAST and/or SCA scans integrated into the CI/CD pipeline?"
        weight: Critical
        choices:
          - text: "Yes — blocking on critical and high findings"
            risk: L
          - text: "Yes — advisory only"
            risk: G
          - text: "Manual scans only"
            risk: M
          - text: "No security scanning"
            risk: H

      - text: "Is DAST or penetration testing performed?"
        weight: High
        choices:
          - text: "Yes — automated DAST in CI/CD + annual pentest"
            risk: L
          - text: "Annual penetration test only"
            risk: G
          - text: "Ad-hoc testing"
            risk: M
          - text: "No DAST or penetration testing"
            risk: H

      - text: "Are development, test, and production environments segregated?"
        weight: High
        choices:
          - text: "Yes — fully segregated with access controls"
            risk: L
          - text: "Partially segregated"
            risk: M
          - text: "Shared environments"
            risk: H

      - text: "Is there a formal change approval process for production deployments?"
        weight: High
        choices:
          - text: "Yes — CAB/change authority approval required"
            risk: L
          - text: "Yes — peer review only"
            risk: M
          - text: "No formal approval process"
            risk: H

      - text: "Is the application managed through the enterprise endpoint or patch management system, or does it require an out-of-band update mechanism?"
        weight: High
        choices:
          - text: "Fully managed via enterprise MDM/SCCM"
            risk: L
          - text: "Partially managed — some updates out-of-band"
            risk: M
          - text: "Entirely out-of-band (CLI / manual / vendor-pushed)"
            risk: H

      - text: "Are human review and approval required before application outputs are used in production or decision-making?"
        weight: High
        choices:
          - text: "Yes — mandatory human review with sign-off"
            risk: L
          - text: "Yes — sampling-based or risk-tiered review"
            risk: M
          - text: "No — outputs used directly without review"
            risk: H

      - text: "Is there a documented change management policy covering all stages of the change lifecycle (SOX CM-1)?"
        weight: High
        choices:
          - text: "Yes — formalized policy with version control and regular review"
            risk: L
          - text: "Yes — documented but not regularly reviewed"
            risk: G
          - text: "Informal or undocumented"
            risk: M
          - text: "No change management policy"
            risk: H

      - text: "Is security sign-off required before promoting changes to production (SOX PD-3)?"
        weight: High
        choices:
          - text: "Yes — formal security review and sign-off"
            risk: L
          - text: "Yes — security review but no formal sign-off"
            risk: G
          - text: "No security review before production promotion"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Is conversion/migration testing performed and documented before data migrations or major upgrades (SOX PD-4)?"
        weight: Medium
        choices:
          - text: "Yes — formal conversion testing with reconciliation"
            risk: L
          - text: "Yes — testing performed but not formally documented"
            risk: G
          - text: "Ad-hoc or no conversion testing"
            risk: M
          - text: "Not applicable"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 5: Vulnerability and Threat Management
  # ─────────────────────────────────────────────────────────────────
  - name: "Vulnerability and Threat Management"
    policy_refs:
      - IISP 7.0
      - ISP 3.2
      - ISP 5.1
    csf_refs:
      - ID.RA
      - DE.CM
    questions:
      - text: "Is the application included in vulnerability scanning scope?"
        weight: Critical
        choices:
          - text: "Yes — authenticated scans weekly+"
            risk: L
          - text: "Yes — unauthenticated scans"
            risk: G
          - text: "Ad-hoc scanning only"
            risk: M
          - text: "Not in scanning scope"
            risk: H

      - text: "What is the SLA for remediating critical vulnerabilities?"
        weight: High
        choices:
          - text: "7 days or fewer"
            risk: L
          - text: "8–30 days"
            risk: G
          - text: "31–90 days"
            risk: M
          - text: "> 90 days or no SLA"
            risk: H

      - text: "Is the application monitored for security events?"
        weight: High
        choices:
          - text: "Yes — SIEM integration with alerting"
            risk: L
          - text: "Yes — log collection without alerting"
            risk: G
          - text: "Partial monitoring"
            risk: M
          - text: "No security monitoring"
            risk: H

      - text: "Are bastion hosts or jump servers used for administrative access to critical systems?"
        weight: High
        guidance: "Evaluate bastion host controls for RDP/SSH access. Assess session recording, MFA enforcement, and access logging."
        applicability:
          - ON_PREM_INTERNAL
          - ON_PREM_VENDOR
        choices:
          - text: "Yes — bastion hosts with session recording and MFA"
            risk: L
          - text: "Yes — bastion hosts without session recording"
            risk: G
          - text: "Direct administrative access with logging"
            risk: M
          - text: "Direct administrative access without controls"
            risk: H

      - text: "Does the application have a web application firewall (WAF)?"
        weight: Medium
        choices:
          - text: "Yes — managed WAF with tuned rules"
            risk: L
          - text: "Yes — default WAF rules"
            risk: G
          - text: "No WAF — network firewall only"
            risk: M
          - text: "No protection layer"
            risk: H

      - text: "Are detective controls implemented to identify unauthorized or anomalous use of this application?"
        weight: High
        choices:
          - text: "Yes — automated detection with real-time alerting"
            risk: L
          - text: "Yes — log-based detection requiring manual review"
            risk: G
          - text: "Partial — some detection capabilities"
            risk: M
          - text: "No detective controls implemented"
            risk: H

      - text: "Are corrective controls defined to remediate or contain issues detected during application use?"
        weight: High
        choices:
          - text: "Yes — automated remediation and rollback capabilities"
            risk: L
          - text: "Yes — documented manual corrective procedures"
            risk: G
          - text: "Partial — ad-hoc correction only"
            risk: M
          - text: "No corrective controls defined"
            risk: H

      - text: "Is application usage monitored with defined KPIs escalated to both team-level and enterprise-level analysis?"
        weight: Medium
        choices:
          - text: "Yes — dashboards with KPIs at both levels"
            risk: L
          - text: "Yes — team-level metrics only"
            risk: G
          - text: "Partial — ad-hoc reporting"
            risk: M
          - text: "No usage monitoring"
            risk: H

      - text: "Is vendor risk scoring or continuous monitoring used for third-party application risk assessment?"
        weight: Medium
        guidance: "Evaluate TPRM program integration — contract-threshold-based assessment (e.g., Risk Recon / SecurityScorecard for vendors below assessment threshold)."
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — continuous vendor risk scoring integrated into risk program"
            risk: L
          - text: "Yes — periodic vendor risk assessment"
            risk: G
          - text: "Ad-hoc vendor risk review only"
            risk: M
          - text: "No vendor risk assessment"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 6: Incident Response and Business Continuity
  # ─────────────────────────────────────────────────────────────────
  - name: "Incident Response and Business Continuity"
    policy_refs:
      - ISP 6.1
      - ISP 6.2
      - IISP 1.0
      - IISP 10.0
    csf_refs:
      - RS.MA
      - RS.AN
      - RC.RP
    questions:
      - text: "Is the application covered by the incident response plan?"
        weight: High
        choices:
          - text: "Yes — application-specific runbook"
            risk: L
          - text: "Yes — covered by general IRP"
            risk: G
          - text: "Partial coverage"
            risk: M
          - text: "Not covered"
            risk: H

      - text: "What is the Recovery Time Objective (RTO)?"
        weight: High
        choices:
          - text: "1 hour or less"
            risk: L
          - text: "1–4 hours"
            risk: G
          - text: "4–24 hours"
            risk: M
          - text: "> 24 hours or undefined"
            risk: H

      - text: "What is the Recovery Point Objective (RPO)?"
        weight: High
        choices:
          - text: "1 hour or less"
            risk: L
          - text: "1–4 hours"
            risk: G
          - text: "4–24 hours"
            risk: M
          - text: "> 24 hours or undefined"
            risk: H

      - text: "When was the last backup restoration test performed?"
        weight: High
        choices:
          - text: "Within 6 months"
            risk: L
          - text: "6–12 months ago"
            risk: G
          - text: "> 12 months ago"
            risk: M
          - text: "Never tested"
            risk: H

      - text: "Is forensic evidence preservation addressed for this application?"
        weight: Medium
        choices:
          - text: "Yes — log retention and chain of custody documented"
            risk: L
          - text: "Partial — logs retained but no formal process"
            risk: M
          - text: "No forensic readiness"
            risk: H

      - text: "Is job scheduling for this application managed through a centralized enterprise scheduler with audit controls (SOX CO-1)?"
        weight: Medium
        choices:
          - text: "Yes — enterprise job scheduler with logging and alerting"
            risk: L
          - text: "Yes — application-level scheduling with logs"
            risk: G
          - text: "Manual or ad-hoc scheduling"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Are batch processing integrity controls implemented to detect and prevent data corruption (SOX CO-4)?"
        weight: Medium
        choices:
          - text: "Yes — automated reconciliation with hash verification"
            risk: L
          - text: "Yes — manual reconciliation procedures"
            risk: G
          - text: "No batch integrity controls"
            risk: M
          - text: "Not applicable"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 7: Third-Party and Supply Chain Risk
  # ─────────────────────────────────────────────────────────────────
  - name: "Third-Party and Supply Chain Risk"
    policy_refs:
      - ISP 2.6
    csf_refs:
      - GV.SC
    questions:
      - text: "What is the network segmentation and accessibility posture for this application?"
        weight: High
        choices:
          - text: "Internal network only — behind VPN with segmentation"
            risk: L
          - text: "Internal network — accessible without segmentation"
            risk: G
          - text: "Internet-facing with WAF and network controls"
            risk: M
          - text: "Internet-facing with minimal controls"
            risk: E
          - text: "External SaaS — no network control"
            risk: H

      - text: "Has a vendor security assessment been completed?"
        weight: High
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — within 12 months"
            risk: L
          - text: "Yes — older than 12 months"
            risk: M
          - text: "No assessment performed"
            risk: H

      - text: "Does the vendor contract include security requirements?"
        weight: High
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — comprehensive security addendum"
            risk: L
          - text: "Yes — basic security clauses"
            risk: M
          - text: "No security requirements in contract"
            risk: H

      - text: "Is there a defined exit strategy for vendor transition?"
        weight: Medium
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — documented with data portability plan"
            risk: L
          - text: "Partial plan"
            risk: M
          - text: "No exit strategy"
            risk: H

      - text: "Is there a phased deployment plan with maturity-gated control enhancements (e.g., crawl/walk/run)?"
        weight: High
        choices:
          - text: "Yes — defined phases with control gates at each stage"
            risk: L
          - text: "Yes — informal phased approach"
            risk: M
          - text: "No — full deployment without phased controls"
            risk: H

      - text: "Have AI-specific risks been formally assessed for this application (e.g., overreliance, output accuracy, prompt consistency, IP leakage)?"
        weight: High
        choices:
          - text: "Yes — formal AI risk assessment completed"
            risk: L
          - text: "Yes — partial assessment of key risks"
            risk: M
          - text: "No — AI risks not assessed"
            risk: H

      - text: "Has a formal supply chain risk management assessment been performed for this application (GV.SC)?"
        weight: High
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — comprehensive SCRM assessment with documented findings"
            risk: L
          - text: "Yes — limited scope assessment"
            risk: G
          - text: "No formal SCRM assessment"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Do vendor contracts include audit rights and security assessment clauses?"
        weight: High
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — comprehensive audit rights with exercised assessments"
            risk: L
          - text: "Yes — contractual audit rights not yet exercised"
            risk: G
          - text: "No audit rights in contracts"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Is software bill of materials (SBOM) or software provenance information available for this application?"
        weight: Medium
        choices:
          - text: "Yes — SBOM with automated vulnerability tracking"
            risk: L
          - text: "Yes — SBOM available but not actively monitored"
            risk: G
          - text: "No SBOM or provenance documentation"
            risk: M
          - text: "Not applicable"
            risk: H

      - text: "Is continuous monitoring of the vendor or supply chain implemented for this application?"
        weight: Medium
        applicability:
          - ON_PREM_VENDOR
          - CLOUD_SAAS
        choices:
          - text: "Yes — automated continuous monitoring with alerts"
            risk: L
          - text: "Yes — periodic review (quarterly or more frequent)"
            risk: G
          - text: "Annual review only"
            risk: M
          - text: "No ongoing monitoring"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 8: Risk Management Governance
  # ─────────────────────────────────────────────────────────────────
  - name: "Risk Management Governance"
    policy_refs:
      - ISP 2.2
    csf_refs:
      - GV.RM
    questions:
      - text: "Has a formal risk appetite statement been established that covers this application?"
        weight: High
        choices:
          - text: "Yes — documented risk appetite with quantitative thresholds"
            risk: L
          - text: "Yes — qualitative risk appetite statement"
            risk: G
          - text: "Informal risk tolerance understanding only"
            risk: M
          - text: "No risk appetite defined"
            risk: H

      - text: "Is this application tracked in an enterprise risk register?"
        weight: High
        choices:
          - text: "Yes — with risk owners, treatment plans, and regular review"
            risk: L
          - text: "Yes — registered but not actively managed"
            risk: G
          - text: "Tracked informally"
            risk: M
          - text: "Not tracked"
            risk: H

      - text: "Has a formal risk assessment been performed for this application?"
        weight: Critical
        choices:
          - text: "Yes — within 12 months using a defined methodology"
            risk: L
          - text: "Yes — older than 12 months"
            risk: G
          - text: "Informal assessment only"
            risk: M
          - text: "No risk assessment performed"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 9: Awareness and Training
  # ─────────────────────────────────────────────────────────────────
  - name: "Awareness and Training"
    policy_refs:
      - ISP 4.2
    csf_refs:
      - PR.AT
    questions:
      - text: "Is role-based security training provided to users of this application?"
        weight: Medium
        choices:
          - text: "Yes — role-specific training with completion tracking"
            risk: L
          - text: "Yes — general security awareness training only"
            risk: G
          - text: "Training available but not mandatory"
            risk: M
          - text: "No training provided"
            risk: H

      - text: "Do privileged users of this application receive additional security training?"
        weight: High
        choices:
          - text: "Yes — specialized privileged user training with assessment"
            risk: L
          - text: "Yes — same training as general users"
            risk: G
          - text: "No additional training for privileged users"
            risk: M
          - text: "Not applicable"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 10: Adverse Event Analysis
  # ─────────────────────────────────────────────────────────────────
  - name: "Adverse Event Analysis"
    policy_refs:
      - ISP 5.1
    csf_refs:
      - DE.AE
    questions:
      - text: "Is security event correlation implemented for this application?"
        weight: High
        choices:
          - text: "Yes — automated correlation with SIEM and alerting"
            risk: L
          - text: "Yes — manual correlation with log review"
            risk: G
          - text: "Partial — some log sources correlated"
            risk: M
          - text: "No event correlation"
            risk: H

      - text: "Are operational baselines and anomaly detection thresholds defined for this application?"
        weight: Medium
        choices:
          - text: "Yes — baselines with automated anomaly detection"
            risk: L
          - text: "Yes — baselines defined but manual monitoring"
            risk: G
          - text: "Informal baselines only"
            risk: M
          - text: "No baselines defined"
            risk: H

      - text: "Is threat intelligence enrichment applied to security events from this application?"
        weight: Medium
        choices:
          - text: "Yes — automated TI enrichment integrated into SIEM"
            risk: L
          - text: "Yes — manual TI lookup for escalated events"
            risk: G
          - text: "No threat intelligence integration"
            risk: M
          - text: "Not applicable"
            risk: H

  # ─────────────────────────────────────────────────────────────────
  # Domain 11: AI Governance
  # ─────────────────────────────────────────────────────────────────
  - name: "AI Governance"
    policy_refs:
      - IISP 5.0
    csf_refs:
      - GV.OC
      - ID.AM
    questions:
      - text: "Is an AI model inventory maintained that includes lifecycle management for models used by or within this application?"
        weight: High
        choices:
          - text: "Yes — comprehensive inventory with versioning, ownership, and retirement procedures"
            risk: L
          - text: "Yes — inventory exists but incomplete lifecycle tracking"
            risk: G
          - text: "Informal tracking only"
            risk: M
          - text: "No AI model inventory"
            risk: H

      - text: "Are AI training data governance and bias controls implemented for this application?"
        weight: High
        choices:
          - text: "Yes — documented data governance with bias testing and mitigation"
            risk: L
          - text: "Yes — data governance without formal bias controls"
            risk: G
          - text: "No formal AI data governance"
            risk: M
          - text: "Not applicable"
            risk: H
